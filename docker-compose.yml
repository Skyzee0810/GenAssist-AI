services:
  postgres:
    image: postgres:16
    container_name: genassist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: genassist_user
      POSTGRES_PASSWORD: genassist_password
      POSTGRES_DB: genassist_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: